<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級課表查詢 - 國立花蓮高中</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --ink:#1a1a2e;--ink-mid:#2d3561;--ink-light:#4a5568;
  --gold:#c9a84c;--gold-lt:#e8d49b;
  --cream:#faf8f3;--cream-mid:#f0ece0;
  --border:#d4c9a8;--red:#8b1a1a;--blue-lt:#eef2ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--ink);}
.topbar{background:var(--ink);padding:11px 28px;display:flex;align-items:center;gap:14px;}
.topbar a{color:var(--gold-lt);text-decoration:none;font-size:.83rem;}
.topbar a:hover{color:var(--gold);}
.topbar-sep{color:rgba(255,255,255,.3);}
.topbar-t{color:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;}
.ph{background:var(--ink-mid);padding:32px 36px 28px;position:relative;overflow:hidden;}
.ph::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 0% 50%,rgba(201,168,76,.12) 0%,transparent 60%);}
.ph h1{position:relative;font-family:'Noto Serif TC',serif;font-size:1.5rem;color:#fff;letter-spacing:.06em;}
.ph p{position:relative;color:var(--gold-lt);font-size:.83rem;margin-top:5px;letter-spacing:.08em;}
.container{max-width:1200px;margin:0 auto;padding:32px 20px;}
.layout{display:grid;grid-template-columns:210px 1fr;gap:24px;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}
/* Sidebar */
.sb-title{font-family:'Noto Serif TC',serif;font-size:.78rem;color:var(--ink-light);
  letter-spacing:.12em;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.grade-sec{margin-bottom:14px;}
.grade-lbl{font-size:.73rem;color:var(--ink-light);padding:5px 0 3px;letter-spacing:.1em;}
.cls-list{display:flex;flex-wrap:wrap;gap:5px;}
.cbtn{padding:6px 11px;background:#fff;border:1px solid var(--border);font-size:.82rem;
  cursor:pointer;color:var(--ink-mid);transition:all .15s;border-radius:2px;
  min-width:50px;text-align:center;font-family:'Noto Sans TC',sans-serif;}
.cbtn:hover{background:var(--gold-lt);border-color:var(--gold);}
.cbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
/* Main */
.empty-state{background:#fff;border:1px solid var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:70px 36px;text-align:center;}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35;}
.empty-txt{color:var(--ink-light);font-size:.88rem;line-height:1.7;}
.sch-card{background:#fff;border:1px solid var(--border);display:none;}
.sch-card.on{display:block;}
.sch-head{background:var(--ink);padding:18px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.sch-head h2{font-family:'Noto Serif TC',serif;color:#fff;font-size:1.1rem;letter-spacing:.06em;}
.sch-badge{background:var(--gold);color:var(--ink);font-size:.75rem;padding:3px 9px;border-radius:2px;}
.sch-body{padding:22px;}
/* Info grid */
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--cream-mid);}
.ig-item{background:var(--cream);padding:9px 13px;border-left:3px solid var(--gold);}
.ig-item .lbl{font-size:.7rem;color:var(--ink-light);display:block;margin-bottom:2px;}
.ig-item .val{font-family:'Noto Serif TC',serif;font-size:.92rem;}
/* View toggle */
.vtog{display:flex;gap:7px;margin-bottom:14px;align-items:center;}
.vtog span{font-size:.78rem;color:var(--ink-light);}
.vbtn{padding:5px 13px;background:var(--cream-mid);border:1px solid var(--border);
  font-size:.78rem;cursor:pointer;border-radius:2px;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.vbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
/* Day tabs */
.dtabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.dtab{flex:1;min-width:58px;padding:9px 6px;background:transparent;border:none;
  font-size:.85rem;cursor:pointer;color:var(--ink-light);position:relative;transition:color .2s;white-space:nowrap;}
.dtab::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--gold);transform:scaleX(0);transition:transform .2s;}
.dtab.active{color:var(--ink);}.dtab.active::after{transform:scaleX(1);}
.dsched{display:none;}.dsched.active{display:block;}
/* Period rows */
.prow{display:flex;align-items:stretch;border-bottom:1px solid var(--cream-mid);min-height:50px;}
.prow:last-child{border-bottom:none;}
.pnum{width:58px;min-width:58px;padding:10px 6px;background:var(--cream-mid);
  text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:.76rem;color:var(--ink-light);border-right:1px solid var(--border);}
.pnum strong{color:var(--ink);font-size:.85rem;display:block;}
.ptime{font-size:.63rem;color:var(--ink-light);margin-top:2px;line-height:1.3;}
.pcontent{flex:1;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.cpill{display:inline-block;padding:4px 11px;background:var(--blue-lt);
  border-left:3px solid var(--ink-mid);font-size:.86rem;font-weight:500;}
.tchip{font-size:.78rem;color:var(--ink-light);padding:3px 9px;
  background:var(--cream-mid);border-radius:2px;}
.pempty{color:#ccc;font-size:.83rem;padding:11px 14px;display:flex;align-items:center;}
/* Table view */
.tv{display:none;}.tv.active{display:block;}
.twrap{overflow-x:auto;}
table.sch{width:100%;border-collapse:collapse;font-size:.81rem;}
table.sch th{background:var(--ink);color:#fff;padding:9px 7px;text-align:center;
  font-family:'Noto Serif TC',serif;font-weight:400;letter-spacing:.05em;white-space:nowrap;}
table.sch td{border:1px solid var(--cream-mid);padding:0;text-align:center;
  vertical-align:middle;min-width:86px;height:52px;}
table.sch tr:nth-child(even) td{background:var(--cream);}
table.sch td.pl{background:var(--cream-mid);font-size:.76rem;color:var(--ink-mid);
  min-width:54px;font-weight:500;padding:6px 4px;height:52px;}
.ci{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:52px;padding:4px 5px;gap:2px;}
.cn{font-weight:500;color:var(--ink);font-size:.81rem;line-height:1.3;}
.tn{font-size:.7rem;color:var(--ink-light);}
.ec{color:#ccc;font-size:.85rem;}
.pdfrow{margin-top:18px;padding-top:14px;border-top:1px solid var(--cream-mid);
  font-size:.82rem;color:var(--ink-light);}
.pdfrow a{color:var(--red);text-decoration:none;}
.pdfrow a:hover{text-decoration:underline;}
/* 教師連結 */
a.tlink{color:inherit;text-decoration:none;cursor:pointer;
  border-bottom:1px dashed var(--border);transition:color .15s,border-color .15s;}
a.tlink:hover{color:var(--red);border-bottom-color:var(--red);}
.ig-item .val a.tlink{font-family:'Noto Serif TC',serif;font-size:.92rem;color:var(--ink);}
.tchip a.tlink{color:var(--ink-light);}
footer{text-align:center;padding:26px;color:var(--ink-light);font-size:.76rem;
  letter-spacing:.08em;border-top:1px solid var(--border);margin-top:36px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 返回首頁</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-t">班級課表查詢</span>
</div>
<div class="ph">
  <h1>班級課表查詢</h1>
  <p>國立花蓮高級中學 ‧ 114學年度 第2學期 ‧ 共 36 個班級</p>
</div>
<div class="container">
  <div class="layout">
    <div class="sidebar">
      <div class="sb-title">選擇班級</div>
      <div id="sbClasses"></div>
    </div>
    <div class="main">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <div class="empty-txt">請從左側選擇班級<br>即可查看完整課程表</div>
      </div>
      <div class="sch-card" id="schCard">
        <div class="sch-head">
          <h2 id="schTitle">班級課表</h2>
          <span class="sch-badge" id="schBadge">班級</span>
        </div>
        <div class="sch-body">
          <div class="ig" id="infoGrid"></div>
          <div class="vtog">
            <span>顯示方式：</span>
            <button class="vbtn active" onclick="setView('day',this)">每日檢視</button>
            <button class="vbtn" onclick="setView('table',this)">整週表格</button>
          </div>
          <div id="dayView">
            <div class="dtabs" id="dayTabs"></div>
            <div id="dayScheds"></div>
          </div>
          <div class="tv" id="tableView">
            <div class="twrap"><table class="sch" id="fullTable"></table></div>
          </div>
          <div class="pdfrow" id="pdfRow"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer>國立花蓮高級中學 ‧ 114學年度第2學期 ‧ 班級課表查詢</footer>

<script>
const DAYS=['一','二','三','四','五'];
const PERIODS=['1','2','3','4','5','6','7','8'];
const PT={'1':'08:00\n08:50','2':'09:00\n09:50','3':'10:10\n11:00',
  '4':'11:10\n12:00','5':'13:10\n14:00','6':'14:10\n15:00','7':'15:10\n16:00','8':'16:10\n17:00'};
const PMAP={'101':1,'102':2,'103':3,'104':4,'105':5,'106':6,'107':7,'108':8,
  '109':9,'110':10,'111':11,'112':12,'201':13,'202':14,'203':15,'204':16,
  '205':17,'206':18,'207':19,'208':20,'209':21,'210':22,'211':23,'212':24,
  '301':25,'302':26,'303':27,'304':28,'305':29,'306':30,'307':31,'308':32,
  '309':33,'310':34,'311':35,'312':36};

let CDB=null, curView='day', curCls=null;

async function load(){
  if(!CDB){const r=await fetch('classdb.json');CDB=await r.json();}
}

// Build sidebar
(function(){
  const grades=[
    {lbl:'一年級',cls:['101','102','103','104','105','106','107','108','109','110','111','112']},
    {lbl:'二年級',cls:['201','202','203','204','205','206','207','208','209','210','211','212']},
    {lbl:'三年級',cls:['301','302','303','304','305','306','307','308','309','310','311','312']},
  ];
  const sb=document.getElementById('sbClasses');
  grades.forEach(g=>{
    const sec=document.createElement('div');sec.className='grade-sec';
    sec.innerHTML=`<div class="grade-lbl">${g.lbl}</div><div class="cls-list" id="list_${g.lbl}"></div>`;
    sb.appendChild(sec);
    const list=sec.querySelector('.cls-list');
    g.cls.forEach(c=>{
      const b=document.createElement('button');b.className='cbtn';b.id='cbtn_'+c;b.textContent=c;
      b.onclick=()=>showClass(c);
      list.appendChild(b);
    });
  });
})();

async function showClass(cls){
  await load();
  const rec=CDB[cls];if(!rec)return;
  curCls=cls;
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
  const cb=document.getElementById('cbtn_'+cls);if(cb)cb.classList.add('active');
  document.getElementById('emptyState').style.display='none';
  document.getElementById('schCard').classList.add('on');
  document.getElementById('schTitle').textContent=cls+' 班課程表';
  document.getElementById('schBadge').textContent=cls+'班';
  document.getElementById('infoGrid').innerHTML=`
    <div class="ig-item"><span class="lbl">班級</span><span class="val">${rec.class}班</span></div>
    <div class="ig-item"><span class="lbl">導師</span><span class="val"><a class="tlink" onclick="goTeacher('${rec.homeroom}')" title="查看 ${rec.homeroom} 老師課表">${rec.homeroom}</a></span></div>
    <div class="ig-item"><span class="lbl">課諮師</span><span class="val"><a class="tlink" onclick="goTeacher('${rec.advisor}')" title="查看 ${rec.advisor} 老師課表">${rec.advisor}</a></span></div>`;
  renderDayView(rec);
  renderTableView(rec);
  document.getElementById('pdfRow').innerHTML=
    `📄 原始課表：<a href="班級正式課表0130.pdf#page=${PMAP[cls]||1}" target="_blank">班級正式課表0130.pdf（第${PMAP[cls]||1}頁）</a>`;
  setView(curView);
  document.getElementById('schCard').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderDayView(rec){
  const tabs=document.getElementById('dayTabs');
  const scheds=document.getElementById('dayScheds');
  tabs.innerHTML='';scheds.innerHTML='';
  DAYS.forEach((d,i)=>{
    const tab=document.createElement('button');
    tab.className='dtab'+(i===0?' active':'');
    tab.textContent='星期'+d;
    tab.onclick=()=>{
      document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.dsched').forEach(s=>s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('day_'+d).classList.add('active');
    };
    tabs.appendChild(tab);
    const div=document.createElement('div');
    div.className='dsched'+(i===0?' active':'');div.id='day_'+d;
    PERIODS.forEach(p=>{
      const cell=rec.timetable[d][p];
      const hasCourse=cell&&cell.course&&cell.course!=='-';
      const hasTeacher=cell&&cell.teacher&&cell.teacher!=='-';
      const times=PT[p].split('\n');
      const row=document.createElement('div');row.className='prow';
      row.innerHTML=`<div class="pnum"><strong>${p}</strong><span class="ptime">${times[0]}<br>${times[1]}</span></div>`;
      if(hasCourse){
        const tchHtml=hasTeacher?`<span class="tchip"><a class="tlink" onclick="goTeacher('${cell.teacher}')" title="查看 ${cell.teacher} 老師課表">${cell.teacher}</a></span>`:'';
        row.innerHTML+=`<div class="pcontent"><span class="cpill">${cell.course}</span>${tchHtml}</div>`;
      } else if(p!=='8'){
        row.innerHTML+=`<div class="pempty">—</div>`;
      } else {
        row.innerHTML+=`<div class="pempty"></div>`;
      }
      div.appendChild(row);
    });
    scheds.appendChild(div);
  });
}

function renderTableView(rec){
  const tbl=document.getElementById('fullTable');
  let h=`<tr><th>節次</th><th>時間</th>${DAYS.map(d=>`<th>星期${d}</th>`).join('')}</tr>`;
  PERIODS.forEach(p=>{
    const times=PT[p].split('\n');
    h+=`<tr><td class="pl">第${p}節</td><td class="pl" style="font-size:.7rem;white-space:nowrap">${times[0]}~${times[1]}</td>`;
    DAYS.forEach(d=>{
      const cell=rec.timetable[d][p];
      const ok=cell&&cell.course&&cell.course!=='-';
      const hasT=cell&&cell.teacher&&cell.teacher!=='-';
      if(ok){
        const tchHtml=hasT?`<span class="tn"><a class="tlink" onclick="goTeacher('${cell.teacher}')" title="查看 ${cell.teacher} 老師課表">${cell.teacher}</a></span>`:'';
        h+=`<td><div class="ci"><span class="cn">${cell.course}</span>${tchHtml}</div></td>`;
      } else if(p!=='8'){
        h+=`<td><div class="ci"><span class="ec">—</span></div></td>`;
      } else {
        h+=`<td></td>`;
      }
    });
    h+='</tr>';
  });
  tbl.innerHTML=h;
}

function setView(v,btn){
  curView=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else document.querySelectorAll('.vbtn').forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='day')||(i===1&&v==='table')));
  document.getElementById('dayView').style.display=v==='day'?'':'none';
  document.getElementById('tableView').classList.toggle('active',v==='table');
}

function goTeacher(name){
  window.location.href='teacher_schedule.html?teacher='+encodeURIComponent(name);
}

// URL param
const p=new URLSearchParams(location.search).get('class');
if(p) load().then(()=>showClass(p));
</script>
</body>
</html>
