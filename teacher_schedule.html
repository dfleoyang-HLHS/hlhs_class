<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師課表查詢 - 國立花蓮高中</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

    :root {
      --ink: #1a1a2e; --ink-mid: #2d3561; --ink-light: #4a5568;
      --gold: #c9a84c; --gold-light: #e8d49b;
      --cream: #faf8f3; --cream-mid: #f0ece0; --red: #8b1a1a;
      --border: #d4c9a8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--cream); font-family: 'Noto Sans TC', sans-serif; color: var(--ink); }

    .topbar {
      background: var(--ink);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar a {
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .topbar a:hover { color: var(--gold); }
    .topbar-sep { color: rgba(255,255,255,0.3); }
    .topbar-title { color: #fff; font-family: 'Noto Serif TC', serif; font-size: 0.9rem; }

    .page-header {
      background: var(--ink-mid);
      padding: 36px 40px 32px;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 100% 50%, rgba(201,168,76,0.12) 0%, transparent 70%);
    }
    .page-header h1 {
      position: relative;
      font-family: 'Noto Serif TC', serif;
      font-size: 1.6rem;
      color: #fff;
      letter-spacing: 0.06em;
    }
    .page-header p {
      position: relative;
      color: var(--gold-light);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    .search-card {
      background: #fff;
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 32px;
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .search-label { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 6px; letter-spacing: 0.06em; }
    .input-g { flex: 1; min-width: 200px; }

    input[type="text"], select {
      width: 100%;
      padding: 11px 14px;
      background: var(--cream);
      border: 1px solid var(--border);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      border-radius: 2px;
    }
    input:focus, select:focus { border-color: var(--gold); background: #fff; }

    .btn {
      padding: 11px 24px;
      background: var(--ink);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
      transition: background 0.2s;
      border-radius: 2px;
    }
    .btn:hover { background: var(--ink-mid); }
    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--cream-mid); }

    /* Teacher grid */
    .teacher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .teacher-card {
      background: #fff;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      text-align: left;
      width: 100%;
    }
    .teacher-card:hover { background: var(--gold-light); }
    .teacher-card.selected { background: var(--ink); color: #fff; }
    .teacher-card.selected .tc-role { color: var(--gold-light); }
    .tc-name { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; display: block; }
    .tc-role { font-size: 0.72rem; color: var(--ink-light); margin-top: 2px; display: block; }

    /* Group headers */
    .group-header {
      grid-column: 1 / -1;
      background: var(--cream-mid);
      padding: 8px 16px;
      font-size: 0.78rem;
      color: var(--ink-light);
      letter-spacing: 0.1em;
      font-family: 'Noto Serif TC', serif;
      border-top: 2px solid var(--border);
    }

    /* Detail Panel */
    .detail-panel {
      display: none;
      background: #fff;
      border: 1px solid var(--border);
    }
    .detail-panel.visible { display: block; }
    .detail-top {
      background: var(--ink);
      padding: 20px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .detail-top h2 {
      font-family: 'Noto Serif TC', serif;
      color: #fff;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
    }
    .detail-badge {
      background: var(--gold);
      color: var(--ink);
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 2px;
    }
    .detail-body { padding: 28px; }

    .pdf-viewer-note {
      background: var(--cream);
      border: 1px dashed var(--border);
      padding: 24px 28px;
      text-align: center;
      border-radius: 2px;
    }
    .pdf-viewer-note p { color: var(--ink-light); font-size: 0.88rem; margin-bottom: 14px; line-height: 1.6; }
    .pdf-viewer-note .open-btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .pdf-viewer-note .open-btn:hover { background: var(--ink-mid); }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 24px;
      padding: 0 0 20px;
      border-bottom: 1px solid var(--cream-mid);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-item { font-size: 0.85rem; }
    .stat-item span { color: var(--ink-light); margin-right: 4px; }

    /* Classes taught list */
    .classes-section { margin-top: 20px; }
    .classes-title { font-size: 0.82rem; color: var(--ink-light); margin-bottom: 10px; letter-spacing: 0.06em; }
    .classes-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .class-tag {
      padding: 5px 14px;
      background: var(--cream-mid);
      border: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
      text-decoration: none;
    }
    .class-tag:hover { background: var(--gold-light); border-color: var(--gold); }

    /* Filter buttons */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .filter-btn {
      padding: 6px 14px;
      background: var(--cream-mid);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    footer {
      text-align: center;
      padding: 28px;
      color: var(--ink-light);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← 返回首頁</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-title">教師課表查詢</span>
</div>

<div class="page-header">
  <h1>教師課表查詢</h1>
  <p>國立花蓮高級中學 &nbsp;·&nbsp; 114學年度 第2學期 &nbsp;·&nbsp; 共 112 位教師</p>
</div>

<div class="container">

  <div class="search-card">
    <div class="search-label">搜尋教師</div>
    <div class="search-row">
      <div class="input-g">
        <input type="text" id="teacherSearch" placeholder="輸入姓名關鍵字…" oninput="filterTeacherGrid()">
      </div>
      <div class="input-g">
        <select id="roleFilter" onchange="filterTeacherGrid()">
          <option value="">── 所有職務 ──</option>
          <option value="導師">導師</option>
          <option value="專任">專任</option>
          <option value="主任">主任 / 組長</option>
          <option value="兼任">兼任</option>
          <option value="教練">教練</option>
          <option value="專輔">專輔</option>
        </select>
      </div>
      <button class="btn" onclick="filterTeacherGrid()">搜尋</button>
      <button class="btn btn-outline" onclick="resetFilter()">清除</button>
    </div>
    <div class="filter-row" id="filterBtns">
      <button class="filter-btn active" onclick="setFilter('')">全部</button>
      <button class="filter-btn" onclick="setFilter('國')">國文科</button>
      <button class="filter-btn" onclick="setFilter('英')">英文科</button>
      <button class="filter-btn" onclick="setFilter('數')">數學科</button>
      <button class="filter-btn" onclick="setFilter('自然')">自然科</button>
      <button class="filter-btn" onclick="setFilter('社會')">社會科</button>
      <button class="filter-btn" onclick="setFilter('體育')">體育</button>
      <button class="filter-btn" onclick="setFilter('藝')">藝術</button>
    </div>
  </div>

  <div class="teacher-grid" id="teacherGrid"></div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-top">
      <h2 id="detailName">教師姓名</h2>
      <span class="detail-badge" id="detailRole">職務</span>
    </div>
    <div class="detail-body">
      <div class="stats-row" id="statsRow"></div>
      <div class="pdf-viewer-note">
        <p>教師課表包含完整節次、科目、授課班級及兼課時數等詳細資訊。<br>請點選下方按鈕開啟 PDF 課表（跳至對應頁面）。</p>
        <a id="pdfOpenBtn" href="#" target="_blank" class="open-btn">📄 開啟教師課表 PDF</a>
      </div>
      <div class="classes-section" id="classesTaught"></div>
    </div>
  </div>

</div>

<footer>國立花蓮高級中學 &nbsp;·&nbsp; 114學年度第2學期 &nbsp;·&nbsp; 教師課表查詢</footer>

<script src="class_data.js"></script>
<script>
let currentFilter = '';

function roleCategory(role) {
  if (!role) return '其他';
  if (role.includes('主任') || role.includes('組長') || role.includes('校長')) return '行政';
  if (role.includes('導師')) return '導師';
  if (role.includes('專任')) return '專任';
  if (role.includes('兼任')) return '兼任';
  if (role.includes('教練')) return '教練';
  if (role.includes('專輔')) return '輔導';
  return '其他';
}

function matchesSubjectFilter(t, kw) {
  if (!kw) return true;
  // Find classes this teacher teaches in class schedules
  let subjects = [];
  Object.values(classScheduleData).forEach(cls => {
    cls.schedule.forEach(([p, d, course, teacher]) => {
      if (teacher && teacher.includes(t.name)) subjects.push(course);
    });
  });
  if (kw === '國') return subjects.some(s => s.startsWith('國語文') || s.includes('國文'));
  if (kw === '英') return subjects.some(s => s.includes('英語') || s.includes('英文'));
  if (kw === '數') return subjects.some(s => s.includes('數學'));
  if (kw === '自然') return subjects.some(s => ['物理','化學','生物','地球科學'].some(n => s.includes(n)));
  if (kw === '社會') return subjects.some(s => ['歷史','地理','公民'].some(n => s.includes(n)));
  if (kw === '體育') return subjects.some(s => s.includes('體育'));
  if (kw === '藝') return subjects.some(s => ['音樂','美術','藝術'].some(n => s.includes(n)));
  return true;
}

function renderGrid(filtered) {
  const grid = document.getElementById('teacherGrid');
  grid.innerHTML = '';

  let lastGroup = '';
  const groups = [
    { label: '行政人員', fn: t => roleCategory(t.role) === '行政' },
    { label: '導師', fn: t => roleCategory(t.role) === '導師' },
    { label: '專任教師', fn: t => roleCategory(t.role) === '專任' },
    { label: '輔導教師', fn: t => roleCategory(t.role) === '輔導' },
    { label: '教練', fn: t => roleCategory(t.role) === '教練' },
    { label: '兼任教師', fn: t => roleCategory(t.role) === '兼任' },
    { label: '其他', fn: t => !['行政','導師','專任','輔導','教練','兼任'].includes(roleCategory(t.role)) },
  ];

  groups.forEach(g => {
    const inGroup = filtered.filter(g.fn);
    if (inGroup.length === 0) return;
    const gh = document.createElement('div');
    gh.className = 'group-header';
    gh.textContent = g.label + ` (${inGroup.length})`;
    grid.appendChild(gh);
    inGroup.forEach(t => {
      const card = document.createElement('button');
      card.className = 'teacher-card';
      card.dataset.page = t.page;
      card.dataset.name = t.name;
      card.dataset.role = t.role;
      card.innerHTML = `<span class="tc-name">${t.name}</span><span class="tc-role">${t.role || '—'}</span>`;
      card.onclick = () => selectTeacher(card, t);
      grid.appendChild(card);
    });
  });

  if (grid.children.length === 0) {
    grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--ink-light);font-size:0.9rem;background:#fff;">無符合條件的教師</div>';
  }
}

function filterTeacherGrid() {
  const kw = document.getElementById('teacherSearch').value.trim();
  const role = document.getElementById('roleFilter').value;

  const filtered = teacherIndex.filter(t => {
    const nameMatch = !kw || t.name.includes(kw) || t.role.includes(kw);
    const roleMatch = !role || t.role.includes(role) || (role === '主任' && (t.role.includes('主任') || t.role.includes('組長')));
    const subjectMatch = matchesSubjectFilter(t, currentFilter);
    return nameMatch && roleMatch && subjectMatch;
  });

  renderGrid(filtered);
}

function setFilter(kw) {
  currentFilter = kw;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  filterTeacherGrid();
}

function resetFilter() {
  document.getElementById('teacherSearch').value = '';
  document.getElementById('roleFilter').value = '';
  currentFilter = '';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  filterTeacherGrid();
  document.getElementById('detailPanel').classList.remove('visible');
}

function selectTeacher(card, t) {
  document.querySelectorAll('.teacher-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');

  document.getElementById('detailName').textContent = t.name + ' 老師';
  document.getElementById('detailRole').textContent = t.role || '未列';

  // Stats
  const statsHTML = `
    <div class="stat-item"><span>姓名：</span>${t.name}</div>
    <div class="stat-item"><span>職務：</span>${t.role || '—'}</div>
    <div class="stat-item"><span>課表頁碼：</span>第 ${t.page} 頁</div>
  `;
  document.getElementById('statsRow').innerHTML = statsHTML;

  // PDF link
  document.getElementById('pdfOpenBtn').href = `教師正式課表0130.pdf#page=${t.page}`;
  document.getElementById('pdfOpenBtn').textContent = `📄 開啟 ${t.name} 老師課表（第 ${t.page} 頁）`;

  // Find classes this teacher teaches
  const classMap = {};
  Object.values(classScheduleData).forEach(cls => {
    cls.schedule.forEach(([p, d, course, teacher]) => {
      if (teacher && teacher.includes(t.name)) {
        if (!classMap[cls.className]) classMap[cls.className] = new Set();
        classMap[cls.className].add(course);
      }
    });
  });

  let classesHTML = '';
  const classIds = Object.keys(classMap).sort();
  if (classIds.length > 0) {
    classesHTML = `<div class="classes-title">在以下班級授課（共 ${classIds.length} 班）：</div>
    <div class="classes-list">`;
    classIds.forEach(cid => {
      const subjects = [...classMap[cid]].join('、');
      classesHTML += `<a href="class_schedule.html?class=${cid}" class="class-tag" title="${subjects}">${cid}班</a>`;
    });
    classesHTML += '</div>';
    if (classIds.length > 0) {
      classesHTML += `<div style="margin-top:12px;font-size:0.78rem;color:var(--ink-light)">* 點選班級編號可查看該班完整課表</div>`;
    }
  } else {
    classesHTML = '<div class="classes-title" style="color:var(--ink-light);font-style:italic;">無授課班級資料（請參閱PDF課表）</div>';
  }
  document.getElementById('classesTaught').innerHTML = classesHTML;

  const panel = document.getElementById('detailPanel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Init
renderGrid(teacherIndex);
</script>
</body>
</html>
