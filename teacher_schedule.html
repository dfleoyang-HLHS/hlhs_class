<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教師課表查詢 - 國立花蓮高中</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --ink:#1a1a2e;--ink-mid:#2d3561;--ink-light:#4a5568;
  --gold:#c9a84c;--gold-lt:#e8d49b;
  --cream:#faf8f3;--cream-mid:#f0ece0;
  --border:#d4c9a8;--red:#8b1a1a;--blue-lt:#eef2ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--ink);}
.topbar{background:var(--ink);padding:11px 28px;display:flex;align-items:center;gap:14px;}
.topbar a{color:var(--gold-lt);text-decoration:none;font-size:.83rem;}
.topbar a:hover{color:var(--gold);}
.topbar-sep{color:rgba(255,255,255,.3);}
.topbar-t{color:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;}
.ph{background:var(--ink-mid);padding:32px 36px 28px;position:relative;overflow:hidden;}
.ph::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(201,168,76,.12) 0%,transparent 70%);}
.ph h1{position:relative;font-family:'Noto Serif TC',serif;font-size:1.5rem;color:#fff;letter-spacing:.06em;}
.ph p{position:relative;color:var(--gold-lt);font-size:.83rem;margin-top:5px;letter-spacing:.08em;}
.container{max-width:1100px;margin:0 auto;padding:32px 20px;}
/* Search */
.scard{background:#fff;border:1px solid var(--border);padding:24px;margin-bottom:28px;}
.slabel{font-size:.8rem;color:var(--ink-light);margin-bottom:6px;letter-spacing:.06em;}
.srow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.ig{flex:1;min-width:180px;}
input[type=text],select{width:100%;padding:10px 13px;background:var(--cream);
  border:1px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:.92rem;
  color:var(--ink);outline:none;transition:border-color .2s;border-radius:2px;}
input:focus,select:focus{border-color:var(--gold);background:#fff;}
.btn{padding:10px 22px;background:var(--ink);color:#fff;border:none;
  font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;
  letter-spacing:.08em;white-space:nowrap;transition:background .2s;border-radius:2px;}
.btn:hover{background:var(--ink-mid);}
.btn-o{background:transparent;color:var(--ink);border:1px solid var(--border);}
.btn-o:hover{background:var(--cream-mid);}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;}
.fbtn{padding:5px 13px;background:var(--cream-mid);border:1px solid var(--border);
  font-size:.78rem;cursor:pointer;border-radius:2px;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.fbtn:hover,.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
/* Teacher grid */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:28px;}
.gh{grid-column:1/-1;background:var(--cream-mid);padding:7px 14px;
  font-size:.76rem;color:var(--ink-light);letter-spacing:.1em;
  font-family:'Noto Serif TC',serif;border-top:2px solid var(--border);}
.tcard{background:#fff;padding:13px 15px;cursor:pointer;transition:background .15s;
  border:none;text-align:left;width:100%;}
.tcard:hover{background:var(--gold-lt);}
.tcard.sel{background:var(--ink);color:#fff;}
.tcard.sel .tc-role{color:var(--gold-lt);}
.tc-name{font-family:'Noto Serif TC',serif;font-size:.92rem;display:block;}
.tc-role{font-size:.7rem;color:var(--ink-light);margin-top:2px;display:block;}
/* Detail */
.dp{display:none;background:#fff;border:1px solid var(--border);}
.dp.on{display:block;}
.dp-top{background:var(--ink);padding:18px 24px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.dp-top h2{font-family:'Noto Serif TC',serif;color:#fff;font-size:1.1rem;letter-spacing:.06em;}
.dp-badge{background:var(--gold);color:var(--ink);font-size:.75rem;padding:3px 9px;border-radius:2px;}
.dp-body{padding:24px;}
.dp-info{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:20px;
  padding-bottom:18px;border-bottom:1px solid var(--cream-mid);}
.dp-ii{font-size:.85rem;color:var(--ink-light);}
.dp-ii strong{color:var(--ink);margin-right:3px;}
/* Schedule table */
.twrap{overflow-x:auto;}
table.sch{width:100%;border-collapse:collapse;font-size:.81rem;}
table.sch th{background:var(--ink);color:#fff;padding:9px 7px;text-align:center;
  font-family:'Noto Serif TC',serif;font-weight:400;letter-spacing:.05em;white-space:nowrap;}
table.sch td{border:1px solid var(--cream-mid);padding:0;text-align:center;
  vertical-align:middle;min-width:86px;height:52px;}
table.sch tr:nth-child(even) td{background:var(--cream);}
table.sch td.pl{background:var(--cream-mid);font-size:.76rem;color:var(--ink-mid);
  min-width:54px;font-weight:500;padding:6px 4px;height:52px;}
.ci{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:52px;padding:4px 5px;gap:2px;}
.cn{font-weight:500;color:var(--ink);font-size:.81rem;line-height:1.3;}
.tn{font-size:.7rem;color:var(--ink-light);}
.ec{color:#ccc;font-size:.85rem;}
/* Classes taught */
.ctitle{font-size:.8rem;color:var(--ink-light);margin:18px 0 9px;letter-spacing:.06em;}
.ctags{display:flex;flex-wrap:wrap;gap:7px;}
.ctag{padding:4px 13px;background:var(--cream-mid);border:1px solid var(--border);
  font-size:.8rem;color:var(--ink-mid);cursor:pointer;border-radius:2px;
  text-decoration:none;transition:all .15s;}
.ctag:hover{background:var(--gold-lt);border-color:var(--gold);}
.pdfrow{margin-top:18px;padding-top:14px;border-top:1px solid var(--cream-mid);
  font-size:.82rem;color:var(--ink-light);}
.pdfrow a{color:var(--red);text-decoration:none;}
.pdfrow a:hover{text-decoration:underline;}
footer{text-align:center;padding:26px;color:var(--ink-light);font-size:.76rem;
  letter-spacing:.08em;border-top:1px solid var(--border);margin-top:36px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 返回首頁</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-t">教師課表查詢</span>
</div>
<div class="ph">
  <h1>教師課表查詢</h1>
  <p>國立花蓮高級中學 ‧ 114學年度 第2學期 ‧ 共 112 位教師</p>
</div>
<div class="container">
  <div class="scard">
    <div class="slabel">搜尋教師</div>
    <div class="srow">
      <div class="ig">
        <input type="text" id="srch" placeholder="輸入姓名關鍵字…" oninput="filterGrid()">
      </div>
      <div class="ig">
        <select id="roleFilter" onchange="filterGrid()">
          <option value="">── 所有職務 ──</option>
          <option value="導師">導師</option>
          <option value="專任">專任</option>
          <option value="主任">主任 / 組長</option>
          <option value="兼任">兼任</option>
          <option value="教練">教練</option>
          <option value="專輔">專輔</option>
        </select>
      </div>
      <button class="btn" onclick="filterGrid()">搜尋</button>
      <button class="btn btn-o" onclick="resetFilter()">清除</button>
    </div>
    <div class="frow" id="frow"></div>
  </div>
  <div class="tgrid" id="tgrid"></div>
  <div class="dp" id="dp">
    <div class="dp-top">
      <h2 id="dpName"></h2>
      <span class="dp-badge" id="dpRole"></span>
    </div>
    <div class="dp-body">
      <div class="dp-info" id="dpInfo"></div>
      <div class="twrap"><table class="sch" id="dpTable"></table></div>
      <div id="dpClasses"></div>
      <div class="pdfrow" id="dpPdf"></div>
    </div>
  </div>
</div>
<footer>國立花蓮高級中學 ‧ 114學年度第2學期 ‧ 教師課表查詢</footer>

<script>
const DAYS=['一','二','三','四','五'];
const PERIODS=['1','2','3','4','5','6','7','8'];
const PT={'1':'08:00\n08:50','2':'09:00\n09:50','3':'10:10\n11:00',
  '4':'11:10\n12:00','5':'13:10\n14:00','6':'14:10\n15:00','7':'15:10\n16:00','8':'16:10\n17:00'};

let TDB=null, TCH_KEYS=[], curFilter='';

async function load(){
  if(!TDB){const r=await fetch('teacherdb.json');TDB=await r.json();TCH_KEYS=Object.keys(TDB);}
}

function roleGroup(role){
  if(!role)return '其他';
  if(/主任|組長/.test(role))return '行政';
  if(/導師/.test(role))return '導師';
  if(/專任/.test(role))return '專任';
  if(/兼任/.test(role))return '兼任';
  if(/教練/.test(role))return '教練';
  if(/專輔/.test(role))return '輔導';
  return '其他';
}

function renderGrid(names){
  const grid=document.getElementById('tgrid');grid.innerHTML='';
  const groups=[
    {lbl:'行政人員',fn:t=>roleGroup(t.role)==='行政'},
    {lbl:'導師',fn:t=>roleGroup(t.role)==='導師'},
    {lbl:'專任教師',fn:t=>roleGroup(t.role)==='專任'},
    {lbl:'輔導教師',fn:t=>roleGroup(t.role)==='輔導'},
    {lbl:'教練',fn:t=>roleGroup(t.role)==='教練'},
    {lbl:'兼任教師',fn:t=>roleGroup(t.role)==='兼任'},
    {lbl:'其他',fn:t=>!['行政','導師','專任','輔導','教練','兼任'].includes(roleGroup(t.role))},
  ];
  let any=false;
  groups.forEach(g=>{
    const sub=names.filter(n=>g.fn(TDB[n]));
    if(!sub.length)return;
    any=true;
    const gh=document.createElement('div');gh.className='gh';
    gh.textContent=g.lbl+` (${sub.length})`;grid.appendChild(gh);
    sub.forEach(n=>{
      const c=document.createElement('button');c.className='tcard';c.dataset.name=n;
      c.innerHTML=`<span class="tc-name">${n}</span><span class="tc-role">${TDB[n].role||'—'}</span>`;
      c.onclick=()=>selectTeacher(n,c);
      grid.appendChild(c);
    });
  });
  if(!any) grid.innerHTML='<div style="padding:28px;text-align:center;color:var(--ink-light);font-size:.88rem;background:#fff">無符合條件的教師</div>';
}

function filterGrid(){
  if(!TDB)return;
  const kw=document.getElementById('srch').value.trim();
  const rf=document.getElementById('roleFilter').value;
  const names=TCH_KEYS.filter(n=>{
    const nameOk=!kw||(n.includes(kw)||TDB[n].role.includes(kw));
    const roleOk=!rf||(TDB[n].role.includes(rf)||
      (rf==='主任'&&/主任|組長/.test(TDB[n].role)));
    return nameOk&&roleOk;
  });
  renderGrid(names);
}

function resetFilter(){
  document.getElementById('srch').value='';
  document.getElementById('roleFilter').value='';
  curFilter='';
  document.querySelectorAll('.fbtn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderGrid(TCH_KEYS);
  document.getElementById('dp').classList.remove('on');
}

// Filter buttons
const FBTNS=[
  {lbl:'全部',kw:''},
  {lbl:'國文科',kw:'國語文'},
  {lbl:'英文科',kw:'英語'},
  {lbl:'數學科',kw:'數學'},
  {lbl:'自然科',kw:'物理|化學|生物|地球科學'},
  {lbl:'社會科',kw:'歷史|地理|公民'},
  {lbl:'體育',kw:'體育'},
  {lbl:'藝術',kw:'音樂|美術|藝術'},
];
(function(){
  const fr=document.getElementById('frow');
  FBTNS.forEach((fb,i)=>{
    const b=document.createElement('button');b.className='fbtn'+(i===0?' active':'');
    b.textContent=fb.lbl;
    b.onclick=()=>{
      curFilter=fb.kw;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      applySubjectFilter();
    };
    fr.appendChild(b);
  });
})();

function applySubjectFilter(){
  if(!TDB){return;}
  if(!curFilter){filterGrid();return;}
  const re=new RegExp(curFilter);
  const names=TCH_KEYS.filter(n=>{
    return DAYS.some(d=>PERIODS.some(p=>{
      const c=TDB[n].timetable[d][p];
      return c&&c.course&&c.course!=='-'&&re.test(c.course);
    }));
  });
  renderGrid(names);
}

function selectTeacher(name,card){
  document.querySelectorAll('.tcard').forEach(c=>c.classList.remove('sel'));
  if(card)card.classList.add('sel');
  const rec=TDB[name];if(!rec)return;
  document.getElementById('dpName').textContent=name+' 老師';
  document.getElementById('dpRole').textContent=rec.role||'—';
  document.getElementById('dpInfo').innerHTML=`
    <div class="dp-ii"><strong>姓名：</strong>${rec.name}</div>
    <div class="dp-ii"><strong>職務：</strong>${rec.role||'—'}</div>`;

  // Build table
  let h=`<tr><th>節次</th><th>時間</th>${DAYS.map(d=>`<th>星期${d}</th>`).join('')}</tr>`;
  PERIODS.forEach(p=>{
    const times=PT[p].split('\n');
    h+=`<tr><td class="pl">第${p}節</td><td class="pl" style="font-size:.7rem;white-space:nowrap">${times[0]}~${times[1]}</td>`;
    DAYS.forEach(d=>{
      const cell=rec.timetable[d][p];
      const ok=cell&&cell.course&&cell.course!=='-';
      const hasCls=ok&&cell.class&&cell.class!=='-';
      if(ok){
        h+=`<td><div class="ci"><span class="cn">${cell.course}</span>${hasCls?`<span class="tn">${cell.class}班</span>`:''}</div></td>`;
      } else if(p!=='8'){
        h+=`<td><div class="ci"><span class="ec">—</span></div></td>`;
      } else {
        h+=`<td></td>`;
      }
    });
    h+='</tr>';
  });
  document.getElementById('dpTable').innerHTML=h;

  // Classes taught
  const classMap={};
  DAYS.forEach(d=>PERIODS.forEach(p=>{
    const c=rec.timetable[d][p];
    if(c&&c.class&&c.class!=='-'&&/^\d{3}$/.test(c.class)){
      if(!classMap[c.class])classMap[c.class]=new Set();
      if(c.course!=='-')classMap[c.class].add(c.course);
    }
  }));
  const cls=Object.keys(classMap).sort();
  let clsHtml='';
  if(cls.length){
    clsHtml=`<div class="ctitle">授課班級（共${cls.length}班）：</div><div class="ctags">`;
    cls.forEach(c=>{
      clsHtml+=`<a href="class_schedule.html?class=${c}" class="ctag" title="${[...classMap[c]].join('、')}">${c}班</a>`;
    });
    clsHtml+='</div>';
  }
  document.getElementById('dpClasses').innerHTML=clsHtml;

  const pg=TCH_KEYS.indexOf(name)+1;
  document.getElementById('dpPdf').innerHTML=
    `📄 原始課表：<a href="教師正式課表0130.pdf#page=${pg}" target="_blank">教師正式課表0130.pdf（第${pg}頁）</a>`;

  const dp=document.getElementById('dp');dp.classList.add('on');
  dp.scrollIntoView({behavior:'smooth',block:'nearest'});
}

load().then(()=>renderGrid(TCH_KEYS));
</script>
</body>
</html>
